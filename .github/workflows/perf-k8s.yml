name: Performance Tests on EC2 Kubernetes

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: perf-pages
  cancel-in-progress: false

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Configure EC2 SSH access
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/rtops_ec2
          chmod 600 ~/.ssh/rtops_ec2
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Start Kubernetes API port-forward on EC2
        run: |
          ssh -i ~/.ssh/rtops_ec2 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          set -euo pipefail
          export KUBECONFIG="$HOME/.kube/config"

          for pid in $(ss -ltnp 'sport = :8000' | sed -n 's/.*pid=\([0-9]\+\).*/\1/p' | sort -u); do
            kill "$pid" || true
          done

          for _ in {1..10}; do
            if ! ss -ltn 'sport = :8000' | grep -q ':8000'; then
              break
            fi
            sleep 1
          done

          if ss -ltn 'sport = :8000' | grep -q ':8000'; then
            echo "Port 8000 is still in use on EC2"
            ss -ltnp 'sport = :8000' || true
            exit 1
          fi

          nohup kubectl port-forward svc/api 8000:8000 -n rtops > /tmp/rtops-api-port-forward.log 2>&1 &

          sleep 3
          EOF

      - name: Open EC2 API tunnel
        run: |
          ssh -i ~/.ssh/rtops_ec2 \
            -fN \
            -L 8000:localhost:8000 \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"

      - name: Wait for API health
        run: |
          API_URL="http://localhost:8000"
          for i in {1..30}; do
            if curl -fsS "${API_URL}/health"; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run performance tests
        env:
          LOCUST_HOST: http://localhost:8000
          LOCUST_RAMP_UP_USERS: 10
          LOCUST_RAMP_UP_DURATION: 20
          LOCUST_SUSTAIN_USERS: 10
          LOCUST_SUSTAIN_DURATION: 40
          LOCUST_RAMP_DOWN_USERS: 0
          LOCUST_RAMP_DOWN_DURATION: 20
          LOCUST_EXIT_CODE_ON_ERROR: 0
          SKIP_REPORT_PUBLISH: "1"
        run: ./scripts/run_perf_tests.sh

      - name: Prepare Locust report site
        if: always()
        run: |
          mkdir -p public

          if [ -d reports/locust ] && [ -n "$(find reports/locust -type f -print -quit)" ]; then
            cp -R reports/locust/. public/
          else
            cat > public/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Performance Report Unavailable</title>
            </head>
            <body>
              <h1>Performance Report Unavailable</h1>
              <p>The Locust report directory was not generated for this run.</p>
              <p>Check the GitHub Actions logs for the performance test step.</p>
            </body>
          </html>
          EOF
          fi

      - name: Publish Locust report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          destination_dir: perf/${{ github.run_id }}
          keep_files: true

      - name: Publish latest performance report pointer
        if: always()
        run: |
          mkdir -p latest-perf
          cat > latest-perf/index.html <<EOF
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=../${{ github.run_id }}/">
              <title>Latest Performance Report</title>
            </head>
            <body>
              <p>Redirecting to <a href="../${{ github.run_id }}/">latest performance report</a>.</p>
            </body>
          </html>
          EOF

      - name: Publish latest performance report redirect
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: latest-perf
          destination_dir: perf/latest
          keep_files: true

      - name: Print report links
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/perf/${{ github.run_id }}/"
          LATEST_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/perf/latest/"
          echo "Locust report: ${REPORT_URL}"
          {
            echo "## Performance Report"
            echo ""
            echo "- Locust HTML report: [Open report](${REPORT_URL})"
            echo "- Latest performance report: [Open latest](${LATEST_URL})"
            echo "- Workflow run: [View run](${RUN_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump Kubernetes logs on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/rtops_ec2 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          export KUBECONFIG="$HOME/.kube/config"

          kubectl get pods -n rtops
          kubectl get jobs -n rtops
          kubectl logs deploy/api -n rtops --tail=100 || true
          cat /tmp/rtops-api-port-forward.log || true
          EOF

      - name: Stop Kubernetes API port-forward on EC2
        if: always()
        run: |
          ssh -i ~/.ssh/rtops_ec2 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          for pid in $(ss -ltnp 'sport = :8000' | sed -n 's/.*pid=\([0-9]\+\).*/\1/p' | sort -u); do
            kill "$pid" || true
          done
          EOF
