name: Deploy To EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy stack on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/rtops
            docker compose pull
            docker compose up -d postgres rabbitmq cache api consumer_order_created consumer_order_paid consumer_order_ready_to_ship consumer_order_shipped consumer_order_delivered
            docker compose exec -T api alembic upgrade head
            docker compose run --rm seed
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error --max-time 5 http://localhost:8000/health; then
                exit 0
              fi
              echo "Waiting for API health check... attempt ${attempt}/30"
              sleep 2
            done
            echo "API did not become healthy in time"
            docker compose logs --tail=100 api
            exit 1
