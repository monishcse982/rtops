name: Deploy K8s To EC2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-k8s:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Kubernetes stack on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          K8S_DATABASE_URL: ${{ secrets.K8S_DATABASE_URL }}
          K8S_RABBITMQ_PASS: ${{ secrets.K8S_RABBITMQ_PASS }}
          K8S_POSTGRES_PASSWORD: ${{ secrets.K8S_POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: K8S_DATABASE_URL,K8S_RABBITMQ_PASS,K8S_POSTGRES_PASSWORD
          script: |
            set -euo pipefail

            export KUBECONFIG="$HOME/.kube/config"

            cd /opt/rtops

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            : "${K8S_DATABASE_URL:?K8S_DATABASE_URL secret is required}"
            : "${K8S_RABBITMQ_PASS:?K8S_RABBITMQ_PASS secret is required}"
            : "${K8S_POSTGRES_PASSWORD:?K8S_POSTGRES_PASSWORD secret is required}"

            cat > k8s/base/secret.env <<EOF
            DATABASE_URL=${K8S_DATABASE_URL}
            RABBITMQ_HOST=rabbitmq
            RABBITMQ_USER=rtops_rmq_user
            RABBITMQ_PASS=${K8S_RABBITMQ_PASS}
            REDIS_URL=redis://cache:6379/0
            POSTGRES_PASSWORD=${K8S_POSTGRES_PASSWORD}
            EOF
            chmod 600 k8s/base/secret.env

            kubectl get namespace rtops >/dev/null

            kubectl get secret ghcr-pull-secret -n rtops >/dev/null

            kubectl delete job migration seed -n rtops --ignore-not-found

            kubectl apply -k k8s/overlays/ec2

            kubectl rollout status statefulset/postgres -n rtops --timeout=180s
            kubectl rollout status statefulset/rabbitmq -n rtops --timeout=180s
            kubectl rollout status statefulset/cache -n rtops --timeout=180s

            kubectl wait --for=condition=complete job/migration -n rtops --timeout=180s
            kubectl rollout status deployment/api -n rtops --timeout=180s
            kubectl wait --for=condition=complete job/seed -n rtops --timeout=180s

            kubectl run rtops-api-health-check \
              --namespace rtops \
              --rm \
              --restart=Never \
              --image=curlimages/curl:8.8.0 \
              --command -- curl -fsS http://api:8000/health
