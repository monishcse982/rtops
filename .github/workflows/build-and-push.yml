name: Build And Push Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/monishcse982/rtops:${{ github.sha }} .
          docker tag ghcr.io/monishcse982/rtops:${{ github.sha }} ghcr.io/monishcse982/rtops:main

      - name: Push image
        run: |
          docker push ghcr.io/monishcse982/rtops:${{ github.sha }}
          docker push ghcr.io/monishcse982/rtops:main
