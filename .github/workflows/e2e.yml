name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Start CI stack
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Run migrations
        run: docker compose -f docker-compose.ci.yml run --rm api alembic upgrade head

      - name: Seed data
        run: docker compose -f docker-compose.ci.yml run --rm seed

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/orders_db
          API_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest tests/e2e

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-artifacts
          path: |
            reports/allure-results
            reports/allure-report

      - name: Print artifact links
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Allure artifacts: ${RUN_URL}"
          {
            echo "## E2E Artifacts"
            echo ""
            echo "- Allure artifacts: [View run artifacts](${RUN_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
