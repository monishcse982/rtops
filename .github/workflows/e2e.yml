name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Configure EC2 SSH access
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/rtops_ec2
          chmod 600 ~/.ssh/rtops_ec2
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Open EC2 service tunnels
        run: |
          ssh -i ~/.ssh/rtops_ec2 \
            -fN \
            -L 8000:localhost:8000 \
            -L 5432:localhost:5432 \
            -L 6379:localhost:6379 \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Seed EC2 test data
        run: |
          ssh -i ~/.ssh/rtops_ec2 "${{ secrets.EC2_USER }}@${{ env.EC2_HOST }}" \
            'cd /opt/rtops && docker compose run --rm seed'

      - name: Run E2E tests
        timeout-minutes: 10
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/orders_db
          API_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379/0
          E2E_HTTP_TIMEOUT_SECONDS: 10
          GENERATE_ALLURE_HTML: "0"
        run: timeout 8m uv run pytest tests/e2e -vv --tb=short

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-artifacts
          path: |
            reports/allure-results
            reports/allure-report

      - name: Print artifact links
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Allure artifacts: ${RUN_URL}"
          {
            echo "## E2E Artifacts"
            echo ""
            echo "- Allure artifacts: [View run artifacts](${RUN_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump EC2 compose logs on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/rtops_ec2 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'cd /opt/rtops && docker compose ps && docker compose logs --tail=100 api'
