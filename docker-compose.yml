version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d orders_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD","rabbitmq-diagnostics","ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: valkey/valkey:8-alpine
    container_name: cache
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD","valkey-cli","ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fastapi_app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/orders_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
      REDIS_URL: redis://cache:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "8000:8000"
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host","0.0.0.0",
        "--port","8000",
        "--reload"
      ]

  consumer_order_created:
    build: .
    container_name: consumer_order_created
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    restart: unless-stopped
    command:
      [ "python","-m","app.events.order_created_consumer" ]

  consumer_order_paid:
    build: .
    container_name: consumer_order_paid
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    restart: unless-stopped
    command:
      [ "python","-m","app.events.order_paid_consumer" ]

  consumer_order_shipped:
    build: .
    container_name: consumer_order_shipped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    restart: unless-stopped
    command:
      [ "python","-m","app.events.order_shipped_consumer" ]

  consumer_order_ready_to_ship:
    build: .
    container_name: consumer_order_ready_to_ship
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    restart: unless-stopped
    command:
      [ "python","-m","app.events.order_ready_consumer" ]

  consumer_order_delivered:
    build: .
    container_name: consumer_order_delivered
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    restart: unless-stopped
    command:
      [ "python","-m","app.events.order_delivered_consumer" ]

  seed:
    build: .
    container_name: seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/orders_db
      NUM_PRODUCTS: 10
      NUM_ORDERS: 5
    command:
      [ "python","-m","app.utils.seed_data" ]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    restart: unless-stopped

volumes:
  pgdata: