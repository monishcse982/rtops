apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

namespace: rtops

resources:
  - namespace.yml
  - configmap.yml
  - postgres-service.yml
  - postgres-statefulset.yml
  - rabbitmq-service.yml
  - rabbitmq-statefulset.yml
  - cache-service.yml
  - cache-statefulset.yml
  - api-service.yml
  - api-deployment.yml
  - migration.yml
  - seed-job.yml

secretGenerator:
  - name: rtops-secret
    envs:
      - secret.env
