info:
  name: Get order details by ID
  type: http
  seq: 2
  tags:
    - Orders

http:
  method: GET
  url: "{{baseUrl}}/api/orders/5"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Order details retrieved successfully
    request:
      url: "{{baseUrl}}/api/orders/:order_id"
      method: GET
      params:
        - name: order_id
          value: ""
          type: path
          description: The ID of the order to retrieve
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "created_at": "2025-03-20T14:30:00",
            "items": [
              {
                "product_id": 1,
                "name": "Product A",
                "quantity": 2,
                "subtotal": 49.98,
                "unit_price": 24.99
              },
              {
                "product_id": 3,
                "name": "Product C",
                "quantity": 1,
                "subtotal": 9.99,
                "unit_price": 9.99
              }
            ],
            "order_id": 123,
            "status": "created",
            "total_price": 59.97
          }
  - name: 404 Response
    description: Order not found
    request:
      url: "{{baseUrl}}/api/orders/:order_id"
      method: GET
      params:
        - name: order_id
          value: ""
          type: path
          description: The ID of the order to retrieve
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/orders/:order_id"
      method: GET
      params:
        - name: order_id
          value: ""
          type: path
          description: The ID of the order to retrieve
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Retrieve detailed information about a specific order.

  ## Path Parameter
  - `order_id`: The unique identifier of the order

  ## Returns
  - Full order details including ID, status, line items, and calculated total price

  ## Raises
  - `404 Not Found`: If the order with the specified ID doesn't exist
