info:
  name: Mark order as ready to ship
  type: http
  seq: 4
  tags:
    - Orders

http:
  method: POST
  url: "{{baseUrl}}/api/orders/:order_id/ready-to-ship"
  params:
    - name: order_id
      value: ""
      type: path
      description: ID of the order to mark as ready to ship
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

