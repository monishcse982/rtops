info:
  name: List all products with pagination
  type: http
  seq: 1
  tags:
    - Products

http:
  method: GET
  url: "{{baseUrl}}/api/products/"
  params:
    - name: page
      value: "1"
      type: query
      description: Page number, starting from 1
    - name: page_size
      value: "20"
      type: query
      description: Number of items per page (1-100)
    - name: sort_by
      value: id
      type: query
      description: Field to sort by (id, name, price, stock)
    - name: sort_order
      value: asc
      type: query
      description: Sort order (asc, desc)
    - name: min_price
      value: ""
      type: query
      description: Minimum price filter
      disabled: true
    - name: max_price
      value: ""
      type: query
      description: Maximum price filter
      disabled: true
    - name: in_stock
      value: ""
      type: query
      description: Filter by stock availability
      disabled: true
    - name: search
      value: ""
      type: query
      description: Search in name and description
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

