info:
  name: Get detailed product information
  type: http
  seq: 3
  tags:
    - Products

http:
  method: GET
  url: "{{baseUrl}}/api/products/:product_id"
  params:
    - name: product_id
      value: ""
      type: path
      description: The ID of the product to retrieve
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Product details successfully retrieved
    request:
      url: "{{baseUrl}}/api/products/:product_id"
      method: GET
      params:
        - name: product_id
          value: ""
          type: path
          description: The ID of the product to retrieve
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "created_at": "2025-03-20T18:30:45.123Z",
            "description": "High-precision gaming mouse with adjustable DPI",
            "id": 1,
            "name": "Gaming Mouse",
            "price": 49.99,
            "stock": 100
          }
  - name: 404 Response
    description: Product not found
    request:
      url: "{{baseUrl}}/api/products/:product_id"
      method: GET
      params:
        - name: product_id
          value: ""
          type: path
          description: The ID of the product to retrieve
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/products/:product_id"
      method: GET
      params:
        - name: product_id
          value: ""
          type: path
          description: The ID of the product to retrieve
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Retrieve detailed information about a specific product.

  ## Path Parameter
  - **product_id**: The unique identifier of the product

  ## Returns
  Detailed product information including stock level and pricing

  ## Raises
  - **404 Not Found**: If the product with the specified ID doesn't exist
