info:
  name: Delete a product
  type: http
  seq: 5
  tags:
    - Products

http:
  method: DELETE
  url: "{{baseUrl}}/api/products/:product_id"
  params:
    - name: product_id
      value: ""
      type: path
      description: The ID of the product to delete
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: Product successfully deleted
    request:
      url: "{{baseUrl}}/api/products/:product_id"
      method: DELETE
      params:
        - name: product_id
          value: ""
          type: path
          description: The ID of the product to delete
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Cannot delete product with active orders
    request:
      url: "{{baseUrl}}/api/products/:product_id"
      method: DELETE
      params:
        - name: product_id
          value: ""
          type: path
          description: The ID of the product to delete
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Product not found
    request:
      url: "{{baseUrl}}/api/products/:product_id"
      method: DELETE
      params:
        - name: product_id
          value: ""
          type: path
          description: The ID of the product to delete
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/products/:product_id"
      method: DELETE
      params:
        - name: product_id
          value: ""
          type: path
          description: The ID of the product to delete
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Delete a product from the inventory.

  ## Path Parameter
  - `product_id`: The unique identifier of the product to delete

  ## Returns
  No content on successful deletion

  ## Raises
  - `404 Not Found`: If the product doesn't exist
  - `400 Bad Request`: If the product cannot be deleted (e.g., referenced by orders)
